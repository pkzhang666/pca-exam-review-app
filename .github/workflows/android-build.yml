name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: npm ci
        working-directory: frontend

      # Build the offline, self-contained study app for Android (bundles the
      # corrected questions.json; no backend needed).
      - run: npm run build
        working-directory: frontend
        env:
          VITE_STANDALONE: 'true'

      - run: npx cap sync android
        working-directory: frontend

      # Decode the stable release keystore from the repository secret.
      # This ensures every build is signed with the same key so users can
      # install updates over previous versions without uninstalling first.
      - name: Decode release keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > frontend/android/app/release.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: frontend/android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/frontend/android/app/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Date-based version, e.g. 2026.06.15.1642 (unique per minute).
      - id: ver
        run: echo "v=$(date -u +'%Y.%m.%d.%H%M')" >> "$GITHUB_OUTPUT"

      - run: cp frontend/android/app/build/outputs/apk/release/app-release.apk QuizForge-${{ steps.ver.outputs.v }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: QuizForge-${{ steps.ver.outputs.v }}
          path: QuizForge-${{ steps.ver.outputs.v }}.apk

      # New release per build (versioned by date) — does not replace prior ones.
      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.ver.outputs.v }}
          name: QuizForge ${{ steps.ver.outputs.v }}
          body: |
            QuizForge Android APK — version ${{ steps.ver.outputs.v }}
            Built from commit ${{ github.sha }}. Download the .apk below and sideload it.
          files: QuizForge-${{ steps.ver.outputs.v }}.apk
