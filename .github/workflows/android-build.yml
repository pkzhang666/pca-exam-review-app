name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: npm ci

      # Build the offline, self-contained study app for Android (bundles the
      # corrected questions.json; no backend needed).
      - run: npm run build
        env:
          VITE_STANDALONE: 'true'

      - run: npx cap sync android

      - run: ./gradlew assembleDebug
        working-directory: android

      # Date-based version, e.g. 2026.06.15.1642 (unique per minute).
      - id: ver
        run: echo "v=$(date -u +'%Y.%m.%d.%H%M')" >> "$GITHUB_OUTPUT"

      - run: cp android/app/build/outputs/apk/debug/app-debug.apk QuizForge-${{ steps.ver.outputs.v }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: QuizForge-${{ steps.ver.outputs.v }}
          path: QuizForge-${{ steps.ver.outputs.v }}.apk

      # New release per build (versioned by date) — does not replace prior ones.
      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.ver.outputs.v }}
          name: QuizForge ${{ steps.ver.outputs.v }}
          body: |
            QuizForge Android APK — version ${{ steps.ver.outputs.v }}
            Built from commit ${{ github.sha }}. Download the .apk below and sideload it.
          files: QuizForge-${{ steps.ver.outputs.v }}.apk
