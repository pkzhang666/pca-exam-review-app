name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: npm ci

      - run: npm run build

      - run: npx cap sync android

      - run: ./gradlew assembleDebug
        working-directory: android

      - uses: actions/upload-artifact@v4
        with:
          name: pca-exam-review-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - run: cp android/app/build/outputs/apk/debug/app-debug.apk pca-exam-review.apk

      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: Latest APK build
          body: |
            Debug APK built automatically from commit ${{ github.sha }}.
            Download `pca-exam-review.apk` below and sideload it onto your device.
          files: pca-exam-review.apk
