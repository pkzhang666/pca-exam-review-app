name: Generate Release Keystore (run once)

# Run this workflow ONCE to create a stable signing key.
# After it runs, copy the printed KEYSTORE_BASE64 value into your repository
# secrets along with the passwords you chose here.
#
# ⚠️  workflow_dispatch inputs appear in the run history on GitHub.
# Use a strong password you're comfortable having in your personal-repo logs.
# The private key material itself (base64 output) is useless without the password.
#
# Required secrets to add after running this workflow:
#   KEYSTORE_BASE64       — base64 output printed in the "Print base64" step
#   KEY_STORE_PASSWORD    — the store_password you entered below
#   KEY_ALIAS             — the key_alias you entered below
#   KEY_PASSWORD          — the key_password you entered below

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias (e.g. quizforge)'
        required: true
        default: 'quizforge'
      store_password:
        description: 'Keystore password (≥ 6 chars)'
        required: true
      key_password:
        description: 'Key password (≥ 6 chars, can match store_password)'
        required: true
      dname:
        description: 'Distinguished name'
        required: false
        default: 'CN=QuizForge, OU=Mobile, O=PK, L=Unknown, ST=Unknown, C=US'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.jks \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "${{ github.event.inputs.dname }}"

      - name: Print base64 keystore
        run: |
          echo "====== COPY THIS VALUE AS SECRET: KEYSTORE_BASE64 ======"
          base64 -w 0 release.jks
          echo ""
          echo "========================================================"
          echo "Also add these secrets:"
          echo "  KEY_ALIAS          = ${{ github.event.inputs.key_alias }}"
          echo "  KEY_STORE_PASSWORD = (the store password you entered)"
          echo "  KEY_PASSWORD       = (the key password you entered)"
